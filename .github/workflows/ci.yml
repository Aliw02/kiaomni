name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Run pure-numpy + mocked-probe tests (no model download)
        run: pytest tests/test_utils.py tests/test_policies.py tests/test_probe_mocked.py tests/test_saliency_strategy.py tests/test_remove_regression.py -v
      - name: Run GPT-2 smoke test (downloads ~500MB)
        run: pytest tests/test_gpt2_smoke.py -v
